<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --green: #2E7D32;
      --dark: #1a1a2e;
      --light: #f5f5f0;
      --text: #333;
      --muted: #666;
      --accent: #228B22;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--light);
      line-height: 1.7;
    }
    header {
      background: var(--dark);
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 a { color: white; text-decoration: none; }
    header p { color: #aaa; margin-top: 0.3rem; font-size: 0.95rem; }
    nav {
      background: var(--green);
      padding: 0.6rem 1rem;
      text-align: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    nav a:hover { text-decoration: underline; }
    main {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1.2rem;
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid #ddd;
      margin-top: 3rem;
    }
    a { color: var(--accent); }
    img { max-width: 100%; border-radius: 4px; }
    code {
      background: #e8e8e0;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1.2rem 0;
    }
    pre code { background: none; padding: 0; color: inherit; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ site.baseurl }}/">Porto Verde</a></h1>
    <p>GIS &middot; Ambiente &middot; Detecao Remota &middot; Google Earth Engine</p>
  </header>
  <nav>
    <a href="{{ site.baseurl }}/">Artigos</a>
    <a href="{{ site.baseurl }}/mapa.html">Mapa 2016-2025</a>
    <a href="{{ site.baseurl }}/ndvi_historico.html">Historico 1947-2024</a>
    <a href="{{ site.baseurl }}/sobre">Sobre</a>
    <a href="https://github.com/coolio1/porto_areas_verdes_mudanca" target="_blank">GitHub</a>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; {{ 'now' | date: "%Y" }} {{ site.author.name }} &middot; Feito com dados Sentinel-2 e Google Earth Engine
  </footer>
</body>
</html>
