<script>
(function() {
    var layerFiles = ['uso_arvores.png', 'uso_solo.png', 'uso_edificado.png', 'arvores_edificado.png', 'arvores_solo.png', 'solo_edificado.png', 'solo_arvores.png'];
    var N = 7;

    function hexToRgb(hex) {
        hex = hex.replace('#','');
        return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
    }

    function recolorOverlay(imgEl, color) {
        var rgb = hexToRgb(color);
        var canvas = document.createElement('canvas');
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            var data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var px = data.data;
            for (var i = 0; i < px.length; i += 4) {
                if (px[i+3] > 0) {
                    px[i] = rgb[0];
                    px[i+1] = rgb[1];
                    px[i+2] = rgb[2];
                }
            }
            ctx.putImageData(data, 0, 0);
            imgEl.src = canvas.toDataURL();
        };
        img.src = imgEl.src;
    }

    function findOverlayImages() {
        var imgs = document.querySelectorAll('.leaflet-image-layer');
        var result = {};
        imgs.forEach(function(img) {
            layerFiles.forEach(function(fname, idx) {
                if (img.src && img.src.indexOf(fname) !== -1) {
                    result[idx] = img;
                }
            });
        });
        return result;
    }

    function applyColors() {
        var overlays = findOverlayImages();
        for (var i = 0; i < N; i++) {
            var picker = document.getElementById('c' + i);
            if (picker && overlays[i]) {
                recolorOverlay(overlays[i], picker.value);
            }
        }
    }

    setTimeout(function() {
        applyColors();
        for (var i = 0; i < N; i++) {
            (function(idx) {
                document.getElementById('c' + idx).addEventListener('input', function() {
                    var overlays = findOverlayImages();
                    if (overlays[idx]) recolorOverlay(overlays[idx], this.value);
                });
            })(i);
        }
    }, 2000);

    var observer = new MutationObserver(function() {
        setTimeout(applyColors, 500);
    });
    setTimeout(function() {
        var pane = document.querySelector('.leaflet-overlay-pane');
        if (pane) observer.observe(pane, {childList: true, subtree: true});
    }, 3000);
})();
</script>
